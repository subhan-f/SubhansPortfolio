name: Deploy CMS → Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'apps/cms/**'

jobs:
  deploy:
    name: Build & deploy Strapi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build & push image
        run: |
          docker build \
            -t us-central1-docker.pkg.dev/personal-portfolio-111/portfolio-cms/strapi:${{ github.sha }} \
            -t us-central1-docker.pkg.dev/personal-portfolio-111/portfolio-cms/strapi:latest \
            apps/cms
          docker push --all-tags us-central1-docker.pkg.dev/personal-portfolio-111/portfolio-cms/strapi

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy strapi-cms \
            --image=us-central1-docker.pkg.dev/personal-portfolio-111/portfolio-cms/strapi:${{ github.sha }} \
            --region=us-central1 \
            --platform=managed \
            --project=personal-portfolio-111 \
            --update-secrets=APP_KEYS=STRAPI_APP_KEYS:latest \
            --update-secrets=API_TOKEN_SALT=STRAPI_API_TOKEN_SALT:latest \
            --update-secrets=ADMIN_JWT_SECRET=STRAPI_ADMIN_JWT_SECRET:latest \
            --update-secrets=TRANSFER_TOKEN_SALT=STRAPI_TRANSFER_TOKEN_SALT:latest \
            --update-secrets=ENCRYPTION_KEY=STRAPI_ENCRYPTION_KEY:latest \
            --update-secrets=JWT_SECRET=STRAPI_JWT_SECRET:latest \
            --update-secrets=CLOUDINARY_NAME=STRAPI_CLOUDINARY_NAME:latest \
            --update-secrets=CLOUDINARY_KEY=STRAPI_CLOUDINARY_KEY:latest \
            --update-secrets=CLOUDINARY_SECRET=STRAPI_CLOUDINARY_SECRET:latest \
            --update-secrets=DATABASE_HOST=STRAPI_DATABASE_HOST:latest \
            --update-secrets=DATABASE_PASSWORD=STRAPI_DATABASE_PASSWORD:latest \
            --set-env-vars=HOST=0.0.0.0,NODE_ENV=production,DATABASE_CLIENT=postgres,DATABASE_PORT=5432,DATABASE_NAME=postgres,DATABASE_USERNAME=postgres,DATABASE_SSL=false,DATABASE_SSL_REJECT_UNAUTHORIZED=false \
            --port=1337 \
            --memory=2Gi \
            --cpu=1
